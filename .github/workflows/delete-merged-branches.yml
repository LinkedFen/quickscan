name: Delete Merged Branches

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Delete merged branch
        run: |
          # Get the branch name from the PR
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          
          # List of protected branches that should never be deleted
          PROTECTED_BRANCHES="main work master develop"
          
          # Check if branch is in protected list
          if echo "$PROTECTED_BRANCHES" | grep -w "$BRANCH_NAME" > /dev/null; then
            echo "Branch '$BRANCH_NAME' is protected and will not be deleted"
            exit 0
          fi
          
          # Delete the branch
          echo "Deleting merged branch: $BRANCH_NAME"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/git/refs/heads/$BRANCH_NAME"
          
          echo "Branch '$BRANCH_NAME' has been deleted successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
