name: Delete Merged Branches

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Delete merged branch
        run: |
          # Get the branch name from the PR
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          
          echo "Processing branch: $BRANCH_NAME"
          
          # Validate branch name to prevent injection attacks
          if [[ ! "$BRANCH_NAME" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "Error: Branch name contains invalid characters"
            exit 1
          fi
          
          # List of protected branches that should never be deleted
          PROTECTED_BRANCHES=("main" "work" "master" "develop" "production" "staging")
          
          # Check if branch is in protected list using array iteration
          for protected in "${PROTECTED_BRANCHES[@]}"; do
            if [[ "$BRANCH_NAME" == "$protected" ]]; then
              echo "Branch '$BRANCH_NAME' is protected and will not be deleted"
              exit 0
            fi
          done
          
          # Check if branch name starts with 'keep-' prefix
          if [[ "$BRANCH_NAME" == keep-* ]]; then
            echo "Branch '$BRANCH_NAME' has 'keep-' prefix and will not be deleted"
            exit 0
          fi
          
          # Delete the branch
          echo "Deleting merged branch: $BRANCH_NAME"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/git/refs/heads/$BRANCH_NAME"
          
          echo "Branch '$BRANCH_NAME' has been deleted successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
